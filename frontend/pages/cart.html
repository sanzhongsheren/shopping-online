<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购物车 - 商品网上交易系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <header class="top-header" id="app-header"></header>
  <div id="toast-container"></div>

  <main class="page-container">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html">首页</a></li>
          <li class="breadcrumb-item active">购物车</li>
        </ol>
      </nav>

      <h4 class="fw-bold mb-3"><i class="fas fa-shopping-cart text-primary-custom me-2"></i>我的购物车</h4>

      <!-- 购物车列表 -->
      <div id="cart-container">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div>
          <p class="mt-2">正在加载购物车...</p>
        </div>
      </div>

      <!-- 底部操作栏 -->
      <div class="bg-white rounded border p-3 mt-3 d-flex justify-content-between align-items-center" id="cart-footer" style="display:none;">
        <div>
          <span class="text-muted">总计: </span>
          <span class="product-price" id="cart-total">¥0.00</span>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-danger" id="btn-clear-cart"><i class="fas fa-trash-alt me-1"></i>清空</button>
          <button class="btn btn-primary btn-lg" id="btn-checkout"><i class="fas fa-credit-card me-2"></i>去结算</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="app-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!App.requireLogin()) return;

      var cartItems = [];

      function loadCart() {
        var container = document.getElementById('cart-container');
        container.innerHTML = '<div class="text-center py-5 text-muted"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div><p class="mt-2">正在加载购物车...</p></div>';

        API.getCart().then(function(items) {
          cartItems = items || [];
          renderCart();
        }).catch(function(err) {
          container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>加载失败</h5><p class="text-muted">' + (err.message || '网络错误') + '</p></div>';
        });
      }

      function renderCart() {
        var container = document.getElementById('cart-container');
        var footer = document.getElementById('cart-footer');

        if (cartItems.length === 0) {
          container.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><h5>购物车是空的</h5><p class="text-muted">快去逛逛吧！</p><a href="product-list.html" class="btn btn-primary mt-2">去购物</a></div>';
          footer.style.display = 'none';
          return;
        }

        container.innerHTML = cartItems.map(function(item) {
          var imgHtml = item.image_url
            ? '<img src="' + item.image_url + '" class="cart-item-img" alt="' + item.product_name + '">'
            : '<div class="cart-item-img d-flex align-items-center justify-content-center bg-light"><i class="fas fa-image text-muted"></i></div>';
          return '<div class="cart-item" data-id="' + item.cart_id + '" data-price="' + (item.price || 0) + '">' +
            imgHtml +
            '<div class="cart-item-info">' +
              '<div class="cart-item-name">' + (item.product_name || '未知商品') + '</div>' +
              '<div class="cart-item-price">¥' + parseFloat(item.price || 0).toFixed(2) + '</div>' +
            '</div>' +
            '<div class="d-flex align-items-center gap-3">' +
              '<div class="quantity-control">' +
                '<button class="qty-btn" data-action="minus"><i class="fas fa-minus"></i></button>' +
                '<input type="text" class="qty-input" value="' + item.quantity + '" readonly>' +
                '<button class="qty-btn" data-action="plus"><i class="fas fa-plus"></i></button>' +
              '</div>' +
              '<button class="btn btn-sm btn-outline-danger delete-item" title="删除"><i class="fas fa-trash-alt"></i></button>' +
            '</div>' +
          '</div>';
        }).join('');

        footer.style.display = 'flex';
        updateTotal();

        // 数量增减
        container.querySelectorAll('.qty-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var cartItem = this.closest('.cart-item');
            var input = cartItem.querySelector('.qty-input');
            var qty = parseInt(input.value) || 1;
            var cartId = cartItem.dataset.id;

            if (this.dataset.action === 'minus' && qty > 1) {
              qty--;
            } else if (this.dataset.action === 'plus') {
              qty++;
            } else {
              return;
            }
            input.value = qty;
            API.updateCartItem(cartId, { quantity: qty }).then(function() {
              updateTotal();
              App.updateCartBadge();
            }).catch(function(err) {
              Utils.toast(err.message || '更新失败', 'error');
            });
          });
        });

        // 删除单项
        container.querySelectorAll('.delete-item').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var cartItem = this.closest('.cart-item');
            var cartId = cartItem.dataset.id;
            if (!confirm('确定要删除该商品吗？')) return;
            API.removeCartItem(cartId).then(function() {
              cartItem.remove();
              updateTotal();
              App.updateCartBadge();
              if (document.querySelectorAll('.cart-item').length === 0) {
                renderCart();
              }
              Utils.toast('已删除', 'info');
            }).catch(function(err) { Utils.toast(err.message || '删除失败', 'error'); });
          });
        });
      }

      function updateTotal() {
        var total = 0;
        document.querySelectorAll('.cart-item').forEach(function(item) {
          var price = parseFloat(item.dataset.price) || 0;
          var qty = parseInt(item.querySelector('.qty-input').value) || 1;
          total += price * qty;
        });
        document.getElementById('cart-total').textContent = '¥' + total.toFixed(2);
      }

      // 清空购物车
      document.getElementById('btn-clear-cart').addEventListener('click', function() {
        if (!confirm('确定要清空购物车吗？')) return;
        API.clearCart().then(function() {
          cartItems = [];
          renderCart();
          App.updateCartBadge();
          Utils.toast('购物车已清空', 'info');
        }).catch(function(err) { Utils.toast(err.message || '操作失败', 'error'); });
      });

      // 去结算
      document.getElementById('btn-checkout').addEventListener('click', function() {
        window.location.href = 'checkout.html';
      });

      loadCart();
    });
  </script>
</body>
</html>
