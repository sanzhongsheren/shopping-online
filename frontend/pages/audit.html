<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核管理 - 商品网上交易系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <header class="top-header" id="app-header"></header>
  <div id="toast-container"></div>

  <main class="page-container">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html">首页</a></li>
          <li class="breadcrumb-item active">审核管理</li>
        </ol>
      </nav>

      <h4 class="fw-bold mb-3"><i class="fas fa-check-double text-primary-custom me-2"></i>审核管理</h4>

      <!-- 审核分类 -->
      <ul class="nav nav-pills mb-3" id="audit-tabs">
        <li class="nav-item"><a class="nav-link active" href="#" data-type="">全部审核</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-type="user_register">用户注册审核</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-type="product_publish">商品发布审核</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-type="product_edit">商品编辑审核</a></li>
      </ul>

      <!-- 审核列表 -->
      <div id="audit-container">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div>
          <p class="mt-2">正在加载审核列表...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 审核处理模态框 -->
  <div class="modal fade" id="auditModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">审核处理</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="audit-info" class="mb-3"></div>
          <div class="mb-3">
            <label class="form-label fw-bold">审核结果</label>
            <div class="d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="audit-result" id="audit-approve" value="approved" checked>
                <label class="form-check-label text-success" for="audit-approve"><i class="fas fa-check me-1"></i>通过</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="audit-result" id="audit-reject" value="rejected">
                <label class="form-check-label text-danger" for="audit-reject"><i class="fas fa-times me-1"></i>驳回</label>
              </div>
            </div>
          </div>
          <div class="mb-3" id="reject-reason-group" style="display:none;">
            <label class="form-label">驳回原因</label>
            <textarea class="form-control" id="audit-reject-reason" rows="2" placeholder="请填写驳回原因..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">审核备注</label>
            <textarea class="form-control" id="audit-comment" rows="2" placeholder="审核备注（选填）"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="btn-submit-audit">
            <i class="fas fa-check me-2"></i>提交审核
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer" id="app-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!App.requireLogin()) return;
      if (!App.isAdmin) {
        document.getElementById('audit-container').innerHTML =
          '<div class="empty-state"><i class="fas fa-shield-alt"></i><h5>权限不足</h5><p class="text-muted">仅管理员可访问审核管理</p></div>';
        return;
      }

      var currentType = '';
      var currentAuditId = null;
      var auditModal = new bootstrap.Modal(document.getElementById('auditModal'));

      // 显示/隐藏驳回原因
      document.querySelectorAll('input[name="audit-result"]').forEach(function(rb) {
        rb.addEventListener('change', function() {
          document.getElementById('reject-reason-group').style.display = this.value === 'rejected' ? 'block' : 'none';
        });
      });

      // 审核类型切换
      document.getElementById('audit-tabs').addEventListener('click', function(e) {
        var a = e.target.closest('.nav-link');
        if (!a) return;
        e.preventDefault();
        document.querySelectorAll('#audit-tabs .nav-link').forEach(function(el) { el.classList.remove('active'); });
        a.classList.add('active');
        currentType = a.dataset.type;
        loadAudits();
      });

      function loadAudits() {
        var container = document.getElementById('audit-container');
        container.innerHTML = '<div class="text-center py-5 text-muted"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div><p class="mt-2">正在加载审核列表...</p></div>';

        API.getPendingAudits().then(function(audits) {
          audits = audits || [];
          if (audits.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-check-double"></i><h5>暂无审核记录</h5></div>';
            return;
          }

          container.innerHTML = '<div class="table-responsive"><table class="table table-hover"><thead><tr><th>ID</th><th>类型</th><th>目标</th><th>申请人</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead><tbody>' +
            audits.map(function(a) {
              var typeText = Utils.statusText[a.audit_type] || a.audit_type;
              var targetText = a.target_type === 'user' ? '用户#' + a.target_id : '商品#' + a.target_id;
              return '<tr>' +
                '<td>' + a.audit_id + '</td>' +
                '<td>' + typeText + '</td>' +
                '<td>' + targetText + '</td>' +
                '<td>' + (a.applicant_name || '#' + a.applicant_id) + '</td>' +
                '<td>' + Utils.statusBadge(a.status) + '</td>' +
                '<td>' + Utils.formatDate(a.submitted_at, 'YYYY-MM-DD') + '</td>' +
                '<td>' +
                  (a.status === 'pending'
                    ? '<button class="btn btn-sm btn-primary do-audit" data-id="' + a.audit_id + '" data-type="' + a.audit_type + '" data-target="' + targetText + '" data-applicant="' + (a.applicant_name || '') + '"><i class="fas fa-gavel me-1"></i>审核</button>'
                    : '<span class="text-muted small">' + Utils.formatDate(a.audited_at, 'MM-DD HH:mm') + ' 已审</span>') +
                '</td>' +
              '</tr>';
            }).join('') +
            '</tbody></table></div>';

          // 绑定审核按钮
          document.querySelectorAll('.do-audit').forEach(function(btn) {
            btn.addEventListener('click', function() {
              var el = this;
              currentAuditId = el.dataset.id;
              document.getElementById('audit-info').innerHTML =
                '<div class="border rounded p-3 bg-light">' +
                  '<div class="mb-1"><strong>审核类型:</strong> ' + (Utils.statusText[el.dataset.type] || el.dataset.type) + '</div>' +
                  '<div class="mb-1"><strong>审核对象:</strong> ' + el.dataset.target + '</div>' +
                  '<div class="mb-0"><strong>申请人:</strong> ' + (el.dataset.applicant || '未知') + '</div>' +
                '</div>';
              document.getElementById('audit-approve').checked = true;
              document.getElementById('reject-reason-group').style.display = 'none';
              document.getElementById('audit-reject-reason').value = '';
              document.getElementById('audit-comment').value = '';
              auditModal.show();
            });
          });
        }).catch(function(err) {
          container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>加载失败</h5><p class="text-muted">' + (err.message || '') + '</p></div>';
        });
      }

      // 提交审核结果
      document.getElementById('btn-submit-audit').addEventListener('click', function() {
        if (!currentAuditId) return;
        var result = document.querySelector('input[name="audit-result"]:checked');
        if (!result) { Utils.toast('请选择审核结果', 'warning'); return; }

        var data = { auditId: currentAuditId, status: result.value };
        if (result.value === 'rejected') {
          data.rejectReason = document.getElementById('audit-reject-reason').value.trim() || '未填写原因';
        }

        var btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>提交中...';

        API.processAudit(data).then(function() {
          Utils.toast('审核处理成功', 'success');
          auditModal.hide();
          loadAudits();
        }).catch(function(err) {
          Utils.toast(err.message || '处理失败', 'error');
        }).finally(function() {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-check me-2"></i>提交审核';
        });
      });

      loadAudits();
    });
  </script>
</body>
</html>
