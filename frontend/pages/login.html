<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 商品网上交易系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="toast-container"></div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-title">
        <h3><i class="fas fa-store me-2"></i>商品交易系统</h3>
        <p id="auth-subtitle">欢迎回来，请登录您的账号</p>
      </div>

      <!-- 标签切换 -->
      <ul class="nav nav-pills nav-justified mb-4" id="auth-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-form" type="button">登录</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-form" type="button">注册</button>
        </li>
      </ul>

      <div class="tab-content">
        <!-- 登录表单 -->
        <div class="tab-pane fade show active" id="login-form">
          <form id="form-login" onsubmit="return false;">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" class="form-control" id="login-username" placeholder="请输入用户名" required>
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="login-password" placeholder="请输入密码" required>
            </div>
            <div class="mb-3">
              <label class="form-label">角色</label>
              <div class="role-selector d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary active" data-role="buyer">买家</button>
                <button type="button" class="btn btn-outline-secondary" data-role="seller">卖家</button>
                <button type="button" class="btn btn-outline-secondary" data-role="admin">管理员</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" id="btn-login-submit">
              <i class="fas fa-sign-in-alt me-2"></i>登录
            </button>
          </form>
        </div>

        <!-- 注册表单 -->
        <div class="tab-pane fade" id="register-form">
          <form id="form-register" onsubmit="return false;">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input type="text" class="form-control" id="reg-username" placeholder="4-20位字母或数字" required>
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input type="password" class="form-control" id="reg-password" placeholder="至少6位" required>
            </div>
            <div class="mb-3">
              <label class="form-label">确认密码</label>
              <input type="password" class="form-control" id="reg-confirm" placeholder="再次输入密码" required>
            </div>
            <div class="mb-3">
              <label class="form-label">邮箱</label>
              <input type="email" class="form-control" id="reg-email" placeholder="example@shop.com">
            </div>
            <div class="mb-3">
              <label class="form-label">手机号</label>
              <input type="tel" class="form-control" id="reg-phone" placeholder="11位手机号">
            </div>
            <div class="mb-3">
              <label class="form-label">角色</label>
              <div class="role-selector d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary active" data-role="buyer">买家</button>
                <button type="button" class="btn btn-outline-secondary" data-role="seller">卖家</button>
              </div>
            </div>
            <div class="mb-3" id="seller-fields" style="display:none;">
              <label class="form-label">真实姓名</label>
              <input type="text" class="form-control" id="reg-realname" placeholder="请输入真实姓名">
              <div class="form-text">卖家需要提供真实身份信息进行审核</div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2" id="btn-register-submit">
              <i class="fas fa-user-plus me-2"></i>注册
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var redirect = Utils.getQueryParam('redirect') || '/index.html';
      var msg = Utils.getQueryParam('msg');
      var tab = Utils.getQueryParam('tab');

      // 提示消息
      if (msg) { Utils.toast(decodeURIComponent(msg), 'info'); }

      // 切换tab
      if (tab === 'register') {
        document.getElementById('register-tab').click();
      }

      // 角色选择
      document.querySelectorAll('.role-selector .btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var parent = this.closest('.role-selector');
          parent.querySelectorAll('.btn').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          // 卖家显示真实姓名
          var sellerFields = document.getElementById('seller-fields');
          if (sellerFields) {
            sellerFields.style.display = this.dataset.role === 'seller' ? 'block' : 'none';
          }
        });
      });

      // ---------- 登录 ----------
      document.getElementById('form-login').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btn-login-submit');
        var username = document.getElementById('login-username').value.trim();
        var password = document.getElementById('login-password').value.trim();
        var role = document.querySelector('#login-form .role-selector .btn.active');
        if (!role) return;

        var errors = Utils.validateForm({
          username: { value: username, required: true, label: '用户名' },
          password: { value: password, required: true, label: '密码', minLength: 6 },
        });
        if (errors) { Utils.showFormErrors(errors); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登录中...';
        try {
          var res = await API.login({ username: username, password: password, role: role.dataset.role });
          Utils.setStorage('user', JSON.stringify(res.user));
          Utils.toast('登录成功！', 'success');
          setTimeout(function() { window.location.href = redirect; }, 500);
        } catch (err) {
          Utils.toast(err.message || '登录失败，请重试', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>登录';
        }
      });

      // ---------- 注册 ----------
      document.getElementById('form-register').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btn-register-submit');
        var username = document.getElementById('reg-username').value.trim();
        var password = document.getElementById('reg-password').value;
        var confirm = document.getElementById('reg-confirm').value;
        var email = document.getElementById('reg-email').value.trim();
        var phone = document.getElementById('reg-phone').value.trim();
        var realname = document.getElementById('reg-realname').value.trim();
        var role = document.querySelector('#register-form .role-selector .btn.active');
        if (!role) return;

        var errors = Utils.validateForm({
          username: { value: username, required: true, label: '用户名', minLength: 4, maxLength: 20 },
          password: { value: password, required: true, label: '密码', minLength: 6 },
        });
        if (errors) { Utils.showFormErrors(errors); return; }
        if (password !== confirm) { Utils.toast('两次密码输入不一致', 'error'); return; }

        var data = { username: username, password: password, role: role.dataset.role };
        if (email) data.email = email;
        if (phone) data.phone = phone;
        if (role.dataset.role === 'seller' && realname) data.real_name = realname;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>注册中...';
        try {
          await API.register(data);
          Utils.toast('注册成功！请登录', 'success');
          // 切到登录tab
          document.getElementById('login-tab').click();
          document.getElementById('login-username').value = username;
        } catch (err) {
          Utils.toast(err.message || '注册失败，请重试', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>注册';
        }
      });
    });
  </script>
</body>
</html>
