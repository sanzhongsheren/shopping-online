<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言中心 - 商品网上交易系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <header class="top-header" id="app-header"></header>
  <div id="toast-container"></div>

  <main class="page-container">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html">首页</a></li>
          <li class="breadcrumb-item"><a href="user-profile.html">个人中心</a></li>
          <li class="breadcrumb-item active">留言中心</li>
        </ol>
      </nav>

      <div class="row">
        <div class="col-md-3">
          <div class="profile-sidebar">
            <div class="user-info">
              <div class="user-avatar"><i class="fas fa-user"></i></div>
              <h6 id="sidebar-username">用户</h6>
              <span id="sidebar-role"></span>
            </div>
            <div class="nav flex-column" id="sidebar-nav">
              <a class="nav-link" href="user-profile.html"><i class="fas fa-user-cog"></i>个人信息</a>
              <a class="nav-link" href="user-profile.html?tab=addresses"><i class="fas fa-map-marker-alt"></i>收货地址</a>
              <a class="nav-link active" href="messages.html"><i class="fas fa-comments"></i>留言中心</a>
              <a class="nav-link" href="order.html"><i class="fas fa-receipt"></i>我的订单</a>
              <a class="nav-link" href="user-profile.html?tab=favorites"><i class="fas fa-heart"></i>我的收藏</a>
            </div>
          </div>
        </div>

        <div class="col-md-9">
          <div class="bg-white rounded border p-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-comments me-2 text-primary-custom"></i>留言中心</h5>

            <!-- 留言分类 -->
            <ul class="nav nav-pills mb-3" id="msg-tabs">
              <li class="nav-item"><a class="nav-link active" href="#" data-target="">全部</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-target="product">商品留言</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-target="order">订单留言</a></li>
              <li class="nav-item"><a class="nav-link" href="#" data-target="system">系统消息</a></li>
            </ul>

            <div id="messages-container">
              <div class="text-center py-5 text-muted">
                <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div>
                <p class="mt-2">正在加载留言...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="app-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!App.requireLogin()) return;

      // 侧栏信息
      if (App.user) {
        document.getElementById('sidebar-username').textContent = App.user.username;
        document.getElementById('sidebar-role').innerHTML = Utils.roleBadge(App.user.role);
      }

      var currentTarget = '';

      document.getElementById('msg-tabs').addEventListener('click', function(e) {
        var a = e.target.closest('.nav-link');
        if (!a) return;
        e.preventDefault();
        document.querySelectorAll('#msg-tabs .nav-link').forEach(function(el) { el.classList.remove('active'); });
        a.classList.add('active');
        currentTarget = a.dataset.target;
        loadMessages();
      });

      function loadMessages() {
        var container = document.getElementById('messages-container');
        container.innerHTML = '<div class="text-center py-5 text-muted"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div><p class="mt-2">正在加载留言...</p></div>';

        var params = {};
        if (currentTarget) params.target_type = currentTarget;

        API.getMessages(params).then(function(msgs) {
          msgs = msgs || [];
          if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i><h5>暂无留言</h5></div>';
            return;
          }

          container.innerHTML = msgs.map(function(m) {
            var date = Utils.formatDate(m.created_at);
            var targetText = Utils.statusText[m.target_type] || m.target_type;
            return '<div class="border-bottom py-3">' +
              '<div class="d-flex justify-content-between align-items-start">' +
                '<div>' +
                  '<strong>' + (m.username || '匿名') + '</strong>' +
                  '<span class="badge bg-secondary ms-2" style="font-size:11px;">' + targetText + '</span>' +
                  (m.status === 'hidden' ? '<span class="badge bg-warning ms-1" style="font-size:11px;">已隐藏</span>' : '') +
                '</div>' +
                '<small class="text-muted">' + date + '</small>' +
              '</div>' +
              '<p class="mb-0 mt-1">' + (m.content || '') + '</p>' +
            '</div>';
          }).join('');
        }).catch(function(err) {
          container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>加载失败</h5><p class="text-muted">' + (err.message || '') + '</p></div>';
        });
      }

      loadMessages();
    });
  </script>
</body>
</html>
