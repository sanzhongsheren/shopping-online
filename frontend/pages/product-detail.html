<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品详情 - 商品网上交易系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <header class="top-header" id="app-header"></header>
  <div id="toast-container"></div>

  <main class="page-container">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="../index.html">首页</a></li>
          <li class="breadcrumb-item"><a href="product-list.html">商品列表</a></li>
          <li class="breadcrumb-item active" id="breadcrumb-product">商品详情</li>
        </ol>
      </nav>

      <div class="bg-white rounded border p-4 mb-3" id="product-detail">
        <div class="text-center py-5 text-muted">
          <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">加载中...</span></div>
          <p class="mt-2">正在加载商品详情...</p>
        </div>
      </div>

      <!-- 留言区 -->
      <div class="bg-white rounded border p-4">
        <h5 class="fw-bold mb-3"><i class="fas fa-comments me-2"></i>商品留言</h5>
        <div id="message-area">
          <div class="text-center text-muted py-3">暂无留言</div>
        </div>
        <div class="mt-3" id="message-form-area">
          <div class="input-group">
            <input type="text" class="form-control" id="msg-input" placeholder="写下你的留言..." maxlength="255">
            <button class="btn btn-primary" id="btn-send-msg">发送</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" id="app-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var productId = Utils.getQueryParam('id');
      if (!productId) {
        document.getElementById('product-detail').innerHTML =
          '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>缺少商品ID</h5></div>';
        return;
      }

      var currentProduct = null;

      // 加载商品详情
      API.getProduct(productId).then(function(p) {
        currentProduct = p;
        if (!p) {
          document.getElementById('product-detail').innerHTML =
            '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>商品不存在</h5></div>';
          return;
        }
        document.getElementById('breadcrumb-product').textContent = p.product_name;

        var imgHtml = p.image_url
          ? '<img src="' + p.image_url + '" class="product-detail-img" alt="' + p.product_name + '">'
          : '<div class="product-detail-img-placeholder"><i class="fas fa-image"></i></div>';

        var statusHtml = Utils.statusBadge(p.status);
        var sellerName = p.seller_name || '未知';
        var roleHtml = Utils.roleBadge('seller');

        document.getElementById('product-detail').innerHTML =
          '<div class="row">' +
            '<div class="col-md-5 mb-3">' + imgHtml + '</div>' +
            '<div class="col-md-7">' +
              '<h4 class="fw-bold mb-2">' + p.product_name + '</h4>' +
              '<div class="mb-2">' + statusHtml + '</div>' +
              '<div class="bg-primary-light p-3 rounded mb-3">' +
                '<div class="product-price mb-1">¥' + parseFloat(p.price).toFixed(2) + '</div>' +
                '<div class="d-flex text-muted small gap-3">' +
                  '<span>库存: <strong>' + (p.stock || 0) + '</strong></span>' +
                  '<span>销量: <strong>' + (p.sales_count || 0) + '</strong></span>' +
                  '<span>浏览量: <strong>' + (p.view_count || 0) + '</strong></span>' +
                '</div>' +
              '</div>' +
              '<div class="mb-3">' +
                '<label class="form-label small text-muted">数量</label>' +
                '<div class="d-flex align-items-center">' +
                  '<div class="quantity-control">' +
                    '<button id="qty-minus"><i class="fas fa-minus"></i></button>' +
                    '<input type="text" id="qty-input" value="1" readonly>' +
                    '<button id="qty-plus"><i class="fas fa-plus"></i></button>' +
                  '</div>' +
                  '<span class="text-muted ms-2 small">' + (p.unit || '件') + '</span>' +
                '</div>' +
              '</div>' +
              '<div class="mb-3">' +
                '<label class="form-label small text-muted">卖家</label>' +
                '<div>' + roleHtml + ' <span class="ms-1">' + sellerName + '</span></div>' +
              '</div>' +
              '<div class="d-flex gap-2">' +
                '<button class="btn btn-primary btn-lg flex-fill" id="btn-add-cart"><i class="fas fa-shopping-cart me-2"></i>加入购物车</button>' +
                '<button class="btn btn-danger btn-lg flex-fill" id="btn-buy-now"><i class="fas fa-bolt me-2"></i>立即购买</button>' +
                '<button class="btn btn-outline-secondary btn-lg" id="btn-favorite"><i class="far fa-heart"></i></button>' +
              '</div>' +
              (p.description ? '<div class="mt-3 p-3 bg-light rounded"><small class="text-muted">' + p.description + '</small></div>' : '') +
            '</div>' +
          '</div>';

        // 数量控制
        var qtyInput = document.getElementById('qty-input');
        document.getElementById('qty-minus').addEventListener('click', function() {
          var v = parseInt(qtyInput.value) || 1;
          if (v > 1) qtyInput.value = v - 1;
        });
        document.getElementById('qty-plus').addEventListener('click', function() {
          var v = parseInt(qtyInput.value) || 1;
          if (v < (p.stock || 999)) qtyInput.value = v + 1;
        });

        // 加入购物车
        document.getElementById('btn-add-cart').addEventListener('click', function() {
          if (!App.requireLogin()) return;
          var qty = parseInt(qtyInput.value) || 1;
          API.addToCart({ productId: p.product_id, quantity: qty }).then(function() {
            Utils.toast('已加入购物车', 'success');
            App.updateCartBadge();
          }).catch(function(err) { Utils.toast(err.message || '加入失败', 'error'); });
        });

        // 立即购买
        document.getElementById('btn-buy-now').addEventListener('click', function() {
          if (!App.requireLogin()) return;
          var qty = parseInt(qtyInput.value) || 1;
          App.goTo('checkout', { product_id: p.product_id, quantity: qty });
        });

        // 收藏
        var favBtn = document.getElementById('btn-favorite');
        API.checkFavorite(productId).then(function(favorited) {
          if (favorited) {
            favBtn.innerHTML = '<i class="fas fa-heart text-danger"></i>';
            favBtn.dataset.fav = '1';
          }
        }).catch(function() {});
        favBtn.addEventListener('click', function() {
          if (!App.requireLogin()) return;
          if (favBtn.dataset.fav === '1') {
            API.removeFavorite(productId).then(function() {
              favBtn.innerHTML = '<i class="far fa-heart"></i>';
              favBtn.dataset.fav = '0';
              Utils.toast('已取消收藏', 'info');
            }).catch(function(err) { Utils.toast(err.message || '操作失败', 'error'); });
          } else {
            API.addFavorite(productId).then(function() {
              favBtn.innerHTML = '<i class="fas fa-heart text-danger"></i>';
              favBtn.dataset.fav = '1';
              Utils.toast('已收藏', 'success');
            }).catch(function(err) { Utils.toast(err.message || '操作失败', 'error'); });
          }
        });

      }).catch(function(err) {
        document.getElementById('product-detail').innerHTML =
          '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>商品加载失败</h5><p class="text-muted">' + (err.message || '网络错误') + '</p></div>';
      });

      // 加载留言
      function loadMessages() {
        API.getMessages({ target_type: 'product', target_id: productId }).then(function(msgs) {
          var area = document.getElementById('message-area');
          msgs = msgs || [];
          if (msgs.length === 0) {
            area.innerHTML = '<div class="text-center text-muted py-3">暂无留言</div>';
            return;
          }
          area.innerHTML = msgs.map(function(m) {
            var date = Utils.formatDate(m.created_at, 'MM月DD日 HH:mm');
            return '<div class="border-bottom py-2">' +
              '<div class="d-flex justify-content-between">' +
                '<strong class="small">' + (m.username || '匿名') + '</strong>' +
                '<span class="text-muted small">' + date + '</span>' +
              '</div>' +
              '<p class="mb-0 mt-1">' + (m.content || '') + '</p>' +
            '</div>';
          }).join('');
        }).catch(function() {});
      }
      loadMessages();

      // 发送留言
      document.getElementById('btn-send-msg').addEventListener('click', function() {
        if (!App.requireLogin()) return;
        var input = document.getElementById('msg-input');
        var content = input.value.trim();
        if (!content) { Utils.toast('请输入留言内容', 'warning'); return; }
        API.sendMessage({ target_type: 'product', target_id: productId, content: content }).then(function() {
          input.value = '';
          Utils.toast('留言发送成功', 'success');
          loadMessages();
        }).catch(function(err) { Utils.toast(err.message || '发送失败', 'error'); });
      });
    });
  </script>
</body>
</html>
