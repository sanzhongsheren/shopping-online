<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品网上交易系统 - 首页</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- 自定义样式 -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- 头部 -->
  <header class="top-header" id="app-header"></header>

  <!-- Toast 通知容器 -->
  <div id="toast-container"></div>

  <!-- 主体内容 -->
  <main class="page-container">
    <div class="container">
      <!-- 分类导航 -->
      <div class="category-bar rounded mb-3" id="category-bar">
        <div class="nav nav-pills" id="category-nav">
          <a class="nav-link active" href="#" data-id="">全部商品</a>
        </div>
      </div>

      <!-- 轮播推荐 -->
      <div class="row mb-4">
        <div class="col-md-8">
          <div id="bannerCarousel" class="carousel slide rounded overflow-hidden" data-bs-ride="carousel" style="height:300px;">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="0" class="active"></button>
              <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="1"></button>
              <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner h-100">
              <div class="carousel-item active h-100" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
                <div class="d-flex align-items-center justify-content-center h-100 text-white">
                  <div class="text-center">
                    <i class="fas fa-shopping-bag mb-3" style="font-size:48px;"></i>
                    <h3>商品网上交易系统</h3>
                    <p class="mb-0">便捷交易 · 安全可靠</p>
                  </div>
                </div>
              </div>
              <div class="carousel-item h-100" style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);">
                <div class="d-flex align-items-center justify-content-center h-100 text-white">
                  <div class="text-center">
                    <i class="fas fa-handshake mb-3" style="font-size:48px;"></i>
                    <h3>买家 · 卖家 · 管理员</h3>
                    <p class="mb-0">三种角色，一站式交易管理</p>
                  </div>
                </div>
              </div>
              <div class="carousel-item h-100" style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);">
                <div class="d-flex align-items-center justify-content-center h-100 text-white">
                  <div class="text-center">
                    <i class="fas fa-shield-alt mb-3" style="font-size:48px;"></i>
                    <h3>审核机制</h3>
                    <p class="mb-0">保障交易安全与商品质量</p>
                  </div>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>
        <div class="col-md-4">
          <div class="bg-white rounded border p-4 h-100">
            <h5 class="mb-3"><i class="fas fa-bullhorn text-primary-custom me-2"></i>系统公告</h5>
            <div id="notice-list">
              <p class="mb-2 text-muted small"><i class="far fa-clock me-1"></i>欢迎使用商品网上交易系统</p>
              <p class="mb-2 text-muted small"><i class="far fa-clock me-1"></i>卖家发布商品需通过审核后方可上架</p>
              <p class="mb-2 text-muted small"><i class="far fa-clock me-1"></i>新注册用户需管理员审核激活</p>
              <p class="mb-0 text-muted small"><i class="far fa-clock me-1"></i>祝您购物愉快！</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 热销商品 -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0 fw-bold"><i class="fas fa-fire text-danger me-2"></i>热销商品</h5>
        <a href="pages/product-list.html" class="text-primary-custom small">查看更多 <i class="fas fa-chevron-right"></i></a>
      </div>

      <div class="row g-3" id="product-grid">
        <div class="col-12 text-center py-5 text-muted">
          <div class="spinner-border text-secondary" role="status">
            <span class="visually-hidden">加载中...</span>
          </div>
          <p class="mt-2">正在加载商品...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer" id="app-footer"></footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- 自定义 JS -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    // ---------- 首页专用逻辑 ----------
    document.addEventListener('DOMContentLoaded', function() {

      // 加载分类
      function loadCategories() {
        API.getCategories().then(function(categories) {
          if (categories && categories.length) {
            var nav = document.getElementById('category-nav');
            categories.forEach(function(cat) {
              if (!cat.parent_id) { // 只显示一级分类
                var a = document.createElement('a');
                a.className = 'nav-link';
                a.href = 'pages/product-list.html?category_id=' + cat.category_id;
                a.textContent = cat.category_name;
                nav.appendChild(a);
              }
            });
          }
        }).catch(function(err) { console.error('分类加载失败:', err); });
      }

      // 加载热销商品
      function loadProducts() {
        var grid = document.getElementById('product-grid');
        API.getProducts({ page: 1, page_size: 12, sort: 'sales' }).then(function(items) {
          items = items || [];
          if (items.length === 0) {
            grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="fas fa-box-open"></i><h5>暂无商品</h5></div></div>';
            return;
          }
          grid.innerHTML = items.map(function(p) {
            var imgHtml = p.image_url
              ? '<img src="' + p.image_url + '" class="product-img" alt="' + p.product_name + '">'
              : '<div class="product-img-placeholder"><i class="fas fa-image"></i></div>';
            return '<div class="col-6 col-md-4 col-lg-3">' +
              '<div class="product-card">' +
                '<a href="pages/product-detail.html?id=' + p.product_id + '">' + imgHtml + '</a>' +
                '<div class="card-body">' +
                  '<a href="pages/product-detail.html?id=' + p.product_id + '" class="product-name">' + p.product_name + '</a>' +
                  '<div class="d-flex justify-content-between align-items-center">' +
                    '<span class="product-price"><span class="symbol">¥</span>' + parseFloat(p.price).toFixed(2) + '</span>' +
                    '<span class="product-sales">已售 ' + (p.sales_count || 0) + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>';
          }).join('');
        }).catch(function(err) {
          grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="fas fa-exclamation-circle"></i><h5>加载失败</h5><p class="text-muted">' + (err.message || '网络错误') + '</p></div></div>';
        });
      }

      loadCategories();
      loadProducts();
    });
  </script>
</body>
</html>
